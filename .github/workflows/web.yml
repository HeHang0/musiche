name: Deploy static content to Pages

on:
  push:
    branches: ['master']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-web:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Build web artifacts
        run: |
          node web/scripts/version.js
          rm -f web/public/logo.png web/public/logo-circle.png || true
          cp resources/logo.png web/public/logo.png || true
          cp resources/logo-circle.png web/public/logo-circle.png || true
          cd web
          yarn
          yarn build:zip
          mkdir -p ../artifacts/web-app
          cp -R dist/. ../artifacts/web-app/
          yarn build:musiche
          echo '<html><head><script>let pathname=location.pathname.substring(9);let redirect=pathname?`${(location.search?"&":"?")}redirect=${pathname}`:"";location.href="/musiche"+location.search+redirect;</script></head></html>' > dist/404.html

      - name: Upload web app dist
        uses: actions/upload-artifact@v7
        with:
          name: web-app-dist
          path: artifacts/web-app

      - name: Upload web zip
        uses: actions/upload-artifact@v7
        with:
          name: web-zip
          path: web/web.zip

      - name: Upload Pages dist
        uses: actions/upload-artifact@v7
        with:
          name: pages-dist
          path: web/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-web-${{ github.run_attempt }}
          path: 'web/dist'

      - name: Deploy to GitHub Pages First
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-web-${{ github.run_attempt }}

  build-on-macos:
    runs-on: macos-15-intel
    needs: build-web
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0

      - name: Download web app dist
        uses: actions/download-artifact@v8
        with:
          name: web-app-dist
          path: web/dist

      - name: Build macOS packages
        run: |
          sw_vers -productVersion
          xcodebuild -version
          
      - name: Install appdmg
        run: npm install -g appdmg

      - name: Get Flutter dependencies
        working-directory: mobile
        run: flutter pub get || true

      - name: Build Intel macOS package
        working-directory: mobile
        run: flutter build macos --release || true

      - name: Build DMG
        working-directory: mobile
        run: appdmg dmg.json musiche.dmg || true

      - name: Upload macOS package
        uses: actions/upload-artifact@v7
        with:
          name: macos-package
          if-no-files-found: warn
          path: |
            mobile/musiche.dmg

  build-on-ios:
    runs-on: macos-26
    needs: build-web
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0

      - name: Download web app dist
        uses: actions/download-artifact@v8
        with:
          name: web-app-dist
          path: web/dist

      - name: Build iOS packages
        run: |
          sw_vers -productVersion
          xcodebuild -version
          cd mobile
          flutter pub get
          flutter build ios --release --no-codesign || true
          mkdir -p Payload
          if ls build/ios/Release-iphoneos/*.app >/dev/null 2>&1; then
            mv build/ios/Release-iphoneos/*.app Payload/musiche.app
            zip -r musiche.zip Payload
            mv musiche.zip musiche.ipa
          fi

      - name: Upload iOS package
        uses: actions/upload-artifact@v7
        with:
          name: ios-package
          if-no-files-found: warn
          path: |
            mobile/musiche.ipa

  build-on-windows:
    runs-on: windows-latest
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Download web zip
        uses: actions/download-artifact@v8
        with:
          name: web-zip
          path: web-package

      - name: Build Windows packages
        shell: pwsh
        run: |
          Remove-Item windows\logo.ico -Force -ErrorAction SilentlyContinue
          Copy-Item resources\logo.ico windows\logo.ico
          Copy-Item web-package\web.zip windows\Resources\web.zip -Force
          cd windows
          Set-Content FodyWeavers.xml "<Weavers><Costura/></Weavers>"
          msbuild Musiche.sln -t:"Restore;Build" /p:Configuration=Release /p:Platform="Any CPU"
          msbuild Musiche.sln -t:"Restore;Build;Publish" /p:Configuration=Release /p:Platform="Any CPU" /p:PublishProfile="Properties\PublishProfiles\net6.0.pubxml" /p:TargetFramework=net6.0-windows
          cd ..\proxy-windows
          Set-Content FodyWeavers.xml "<Weavers><Costura/></Weavers>"
          msbuild ProxyServer.sln -t:"Restore;Build" /p:Configuration=Release /p:Platform="Any CPU"

      - name: Stage Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\windows | Out-Null
          Copy-Item windows\Resources\web.zip artifacts\windows\web.zip -Force
          Copy-Item windows\bin\Release\net472\Musiche.exe artifacts\windows\Musiche.exe -Force
          Copy-Item windows\bin\Publish\net6.0-windows\Musiche.exe artifacts\windows\Musiche.net6.exe -Force
          Copy-Item proxy-windows\bin\Release\net472\ProxyServer.exe artifacts\windows\ProxyServer.exe -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: windows-package
          path: artifacts/windows

  build-on-android:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0

      - name: Download web app dist
        uses: actions/download-artifact@v8
        with:
          name: web-app-dist
          path: web/dist

      - name: Prepare assets
        shell: bash
        run: |
          rm -rf mobile/assets || true
          cp -r web/dist/* mobile/assets/ || true
          
      - name: Build Android package
        run: |
          sed -i 's#https\\://mirrors.cloud.tencent.com/gradle/#https\\://services.gradle.org/distributions/#g' android/gradle/wrapper/gradle-wrapper.properties
          flutter build apk --release
        working-directory: mobile

      - name: Stage Android package
        shell: bash
        run: |
          mkdir -p artifacts/android || true
          cp mobile/build/app/outputs/flutter-apk/app-release.apk artifacts/android/Musiche.apk || true

      - name: Upload Android package
        uses: actions/upload-artifact@v7
        with:
          name: android-package
          path: artifacts/android

  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - build-web
      - build-on-macos
      - build-on-ios
      - build-on-windows
      - build-on-android
    steps:
      - name: Download Pages dist
        uses: actions/download-artifact@v8
        with:
          name: pages-dist
          path: web/dist

      - name: Download web zip
        uses: actions/download-artifact@v8
        with:
          name: web-zip
          path: packages/web

      - name: Download Windows package
        uses: actions/download-artifact@v8
        with:
          name: windows-package
          path: packages/windows

      - name: Download Android package
        uses: actions/download-artifact@v8
        with:
          name: android-package
          path: packages/android

      - name: Download macOS package
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: macos-package
          path: packages/macos

      - name: Download iOS package
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ios-package
          path: packages/ios

      - name: Merge release files
        shell: bash
        run: |
          cp packages/web/web.zip web/dist/web.zip || true
          cp packages/windows/Musiche.exe web/dist/Musiche.exe || true
          cp packages/windows/Musiche.net6.exe web/dist/Musiche.net6.exe || true
          cp packages/windows/ProxyServer.exe web/dist/ProxyServer.exe || true
          cp packages/android/Musiche.apk web/dist/Musiche.apk || true
          cp packages/macos/musiche.dmg web/dist/Musiche.dmg || true
          cp packages/ios/musiche.ipa web/dist/Musiche.ipa || true
          ls -la web/dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-complete-${{ github.run_attempt }}
          path: 'web/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-complete-${{ github.run_attempt }}

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            web/dist/web.zip
            web/dist/Musiche.exe
            web/dist/Musiche.net6.exe
            web/dist/Musiche.apk
            web/dist/Musiche.ipa
            web/dist/Musiche.dmg
            web/dist/ProxyServer.exe
