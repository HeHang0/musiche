  build-on-android:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0

      - name: Download web app dist
        uses: actions/download-artifact@v8
        with:
          name: web-app-dist
          path: web/dist

      - name: Prepare assets
        shell: pwsh
        run: |
          Remove-Item mobile\assets -Force -Recurse -ErrorAction SilentlyContinue
          Copy-Item web\dist mobile\assets -Force -Recurse
          
      - name: Build Android package
        run: |
          sed -i 's#https\\://mirrors.cloud.tencent.com/gradle/#https\\://services.gradle.org/distributions/#g' android/gradle/wrapper/gradle-wrapper.properties
          flutter build apk --release
        working-directory: mobile

      - name: Stage Android package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\android | Out-Null
          Copy-Item mobile\build\app\outputs\flutter-apk\app-release.apk artifacts\android\Musiche.apk -Force

      - name: Upload Android package
        uses: actions/upload-artifact@v7
        with:
          name: android-package
          path: artifacts/android

  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: windows-latest
    needs:
      - build-web
      - build-on-android
    steps:
      - name: Download Pages dist
        uses: actions/download-artifact@v8
        with:
          name: pages-dist
          path: web/dist

      - name: Download web zip
        uses: actions/download-artifact@v8
        with:
          name: web-zip
          path: packages/web

      - name: Download Android package
        uses: actions/download-artifact@v8
        with:
          name: android-package
          path: packages/android

      - name: Merge release files
        shell: pwsh
        run: |
          Copy-Item packages/web/web.zip web/dist/web.zip -Force -ErrorAction SilentlyContinue
          Copy-Item packages/android/Musiche.apk web/dist/Musiche.apk -Force -ErrorAction SilentlyContinue
          Get-ChildItem web/dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'web/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            web/dist/web.zip
            web/dist/Musiche.apk
