name: Deploy static content to Pages

on:
  push:
    branches: ['master']
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Build web artifacts
        run: |
          node web/scripts/version.js
          rm -f web/public/logo.png web/public/logo-circle.png || true
          cp resources/logo.png web/public/logo.png || true
          cp resources/logo-circle.png web/public/logo-circle.png || true
          cd web
          yarn
          yarn build:zip
          mkdir -p ../artifacts/web-app
          cp -R dist/. ../artifacts/web-app/
          yarn build:musiche
          echo '<html><head><script>if(!localStorage.getItem("musiche-proxy-address"))localStorage.setItem("musiche-proxy-address","https://music.picapico.top/proxy");let pathname=location.pathname.substring(9);let redirect=pathname?`${(location.search?"&":"?")}redirect=${pathname}`:"";location.href="/musiche"+location.search+redirect;</script></head></html>' > dist/404.html

      - name: Upload web app dist
        uses: actions/upload-artifact@v7
        with:
          name: web-app-dist
          path: artifacts/web-app

      - name: Upload web zip
        uses: actions/upload-artifact@v7
        with:
          name: web-zip
          path: web/web.zip

      - name: Upload Pages dist
        uses: actions/upload-artifact@v7
        with:
          name: pages-dist
          path: web/dist

